name: Build & Cache
on:
  push:
    branches: [main]
    paths: ['pkgs/**', 'lib/**', '*.nix', 'flake.lock']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
      
      - uses: cachix/cachix-action@v15
        with:
          name: mynur
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      
      - name: Build all packages
        run: |
          nix build .#packages.x86_64-linux.codex
          nix build .#packages.x86_64-linux.opencode-cli
          nix build .#packages.x86_64-linux.opencode-gui
          nix build .#packages.x86_64-linux.mimode-cli
          nix build .#packages.x86_64-linux.antigravity
          nix build .#packages.x86_64-linux.antigravity-cli
          nix build .#packages.x86_64-linux.qoder
          nix build .#packages.x86_64-linux.qoder-cli
          nix build .#packages.x86_64-linux.cc-switch-cli
          nix build .#packages.x86_64-linux.cc-switch-gui
          nix build .#packages.x86_64-linux.cctui
          nix build .#packages.x86_64-linux.kilo-cli
          nix build .#packages.x86_64-linux.oh-my-opencode
          nix build .#packages.x86_64-linux.opencode-bridge
          nix build .#packages.x86_64-linux.graphify
          nix build .#packages.x86_64-linux.dingtalk
          nix build .#packages.x86_64-linux.duckdb-odbc
          nix build .#packages.x86_64-linux.warpd
          nix build .#packages.x86_64-linux.rustdesk
          nix build .#packages.x86_64-linux.v2rayn
