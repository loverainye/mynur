name: Build & Cache
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
      
      - uses: cachix/cachix-action@v15
        with:
          name: mynur
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      
      - name: Clean nix store cache
        run: |
          nix store gc --max 0 2>/dev/null || true
      
      - name: Build all packages
        run: |
          nix build .#packages.x86_64-linux.codex --refresh
          nix build .#packages.x86_64-linux.opencode-cli --refresh
          nix build .#packages.x86_64-linux.opencode-gui --refresh
          nix build .#packages.x86_64-linux.mimode-cli --refresh
          nix build .#packages.x86_64-linux.antigravity --refresh
          nix build .#packages.x86_64-linux.antigravity-cli --refresh
          nix build .#packages.x86_64-linux.qoder --refresh
          nix build .#packages.x86_64-linux.qoder-cli --refresh
          nix build .#packages.x86_64-linux.cc-switch-cli --refresh
          nix build .#packages.x86_64-linux.cc-switch-gui --refresh
          nix build .#packages.x86_64-linux.cctui --refresh
          nix build .#packages.x86_64-linux.kilo-cli --refresh
          nix build .#packages.x86_64-linux.oh-my-opencode --refresh
          nix build .#packages.x86_64-linux.opencode-bridge --refresh
          nix build .#packages.x86_64-linux.graphify --refresh
          nix build .#packages.x86_64-linux.dingtalk --refresh
          nix build .#packages.x86_64-linux.duckdb-odbc --refresh
          nix build .#packages.x86_64-linux.warpd --refresh
          nix build .#packages.x86_64-linux.rustdesk --refresh
          nix build .#packages.x86_64-linux.v2rayn --refresh
